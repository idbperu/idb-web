<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VITA Live Scene</title>
    <link rel="stylesheet" href="vita-live-scene.css">
  </head>
  <body style="margin: 0;">
    <main id="vita-live-scene" class="vita-live-scene-root" aria-label="VITA atendiendo consultas de bienestar en tiempo real">
      <section class="vita-live-scene-stage">
        <figure class="vita-live-scene-vita">
          <span class="vita-live-scene-vita-halo" aria-hidden="true"></span>
          <img src="assets/vita/vita-central.webp" width="1254" height="1254" alt="VITA, asistente digital de bienestar del IDB">
        </figure>

        <div class="vita-live-scene-patients" aria-label="Personas que reciben orientación de VITA">
          <figure class="vita-live-scene-patient vita-live-scene-patient-01">
            <img src="assets/personas/paciente-01.webp" width="1024" height="1536" alt="Mujer adulta mayor en una consulta de bienestar">
          </figure>
          <figure class="vita-live-scene-patient vita-live-scene-patient-02">
            <img src="assets/personas/paciente-02.webp" width="1024" height="1536" alt="Hombre adulto en una consulta de bienestar">
          </figure>
          <figure class="vita-live-scene-patient vita-live-scene-patient-03">
            <img src="assets/personas/paciente-03.webp" width="1024" height="1536" alt="Mujer adulta en una consulta de bienestar">
          </figure>
          <figure class="vita-live-scene-patient vita-live-scene-patient-04">
            <img src="assets/personas/paciente-04.webp" width="1024" height="1536" alt="Mujer profesional en una consulta de bienestar">
          </figure>
          <figure class="vita-live-scene-patient vita-live-scene-patient-05">
            <img src="assets/personas/paciente-05.webp" width="1024" height="1536" alt="Hombre adulto mayor en una consulta de bienestar">
          </figure>
          <figure class="vita-live-scene-patient vita-live-scene-patient-06">
            <img src="assets/personas/paciente-06.webp" width="1023" height="1537" alt="Mujer joven en una consulta de bienestar">
          </figure>
        </div>

        <div class="vita-live-scene-ambient" aria-hidden="true">
          <span class="vita-live-scene-note vita-live-scene-note-01">Tengo una consulta…</span>
          <span class="vita-live-scene-note vita-live-scene-note-02">Escribiendo<span class="vita-live-scene-dots">•••</span></span>
          <span class="vita-live-scene-note vita-live-scene-note-03">Gracias, VITA <b>✓✓</b></span>
          <span class="vita-live-scene-note vita-live-scene-note-04">Mensaje enviado <b>✓</b></span>
          <span class="vita-live-scene-medical vita-live-scene-medical-plus">+</span>
          <span class="vita-live-scene-medical vita-live-scene-medical-pulse">⌁</span>
          <span class="vita-live-scene-curve vita-live-scene-curve-01"></span>
          <span class="vita-live-scene-curve vita-live-scene-curve-02"></span>
          <span class="vita-live-scene-glow vita-live-scene-glow-01"></span>
          <span class="vita-live-scene-glow vita-live-scene-glow-02"></span>
        </div>
      </section>
    </main>
    <script src="vita-live-scene.js"></script>
  </body>
</html>
