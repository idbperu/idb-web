<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="idb-verified-master-title idb-verified-master-desc" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="idb-verified-master-title">IDB VERIFIED</title>
