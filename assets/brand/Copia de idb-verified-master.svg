  <defs>
    <path id="idb-verified-master-top-arc" d="M38.5 160 A121.5 121.5 0 0 1 281.5 160"/>
    <path id="idb-verified-master-bottom-arc" d="M38.5 160 A121.5 121.5 0 0 0 281.5 160"/>
