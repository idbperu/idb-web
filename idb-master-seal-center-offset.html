<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDB Master Seal — Desplazamiento del bloque central</title>
  <style>
    :root {
      --idb-green: #176c59;
      --ink: #16312d;
      --muted: #65756f;
      --paper: #ffffff;
      --line: #dfe8e4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 48px 24px;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
    }
    header {
      max-width: 760px;
      margin: 0 auto 44px;
      text-align: center;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 3rem); line-height: 1.05; }
    header p { margin: 14px 0 0; color: var(--muted); }
    .comparison {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 42px;
    }
    article { min-width: 0; text-align: center; }
    h2 { margin: 0 0 20px; font-size: 1rem; letter-spacing: .04em; }
    .seal {
      display: block;
      width: min(100%, 300px);
      height: auto;
      margin: 0 auto;
    }
    .seal text {
      fill: var(--idb-green);
      font-family: Arial, Helvetica, sans-serif;
      text-anchor: middle;
    }
    .arc { font-weight: 700; }
    .idb { font-weight: 600; }
    .verified { font-weight: 500; }
    .spec {
      max-width: 280px;
      margin: 22px auto 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.5;
    }
    .spec strong { color: var(--ink); }
    @media (max-width: 760px) {
      body { padding: 36px 20px; }
      .comparison { grid-template-columns: 1fr; gap: 54px; }
      .seal { width: min(100%, 280px); }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/brand/idb-verified-master.svg?v=20260715">
</head>
<body>
  <header>
    <h1>D3 · Asimetría central controlada</h1>
    <p>Solo cambia la coordenada horizontal del bloque IDB / VERIFIED.</p>
  </header>

  <main class="comparison">
    <article>
      <h2>Desplazamiento +6 px</h2>
      <svg class="seal" viewBox="0 0 320 320" role="img" aria-label="D3 con bloque central desplazado 6 píxeles a la derecha">
        <defs>
          <path id="center6-top" d="M41 160 A119 119 0 0 1 279 160"/>
          <path id="center6-bottom" d="M41 160 A119 119 0 0 0 279 160"/>
        </defs>
        <circle cx="160" cy="160" r="143" fill="none" stroke="#176c59" stroke-width="2.6"/>
        <circle cx="160" cy="160" r="133" fill="none" stroke="#176c59" stroke-width="1.4"/>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center6-top" startOffset="50%" text-anchor="middle">INSTITUTO DIGITAL</textPath></text>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center6-bottom" startOffset="50%" text-anchor="middle">DE BIENESTAR</textPath></text>
        <text class="idb" x="166" y="158" font-size="41" letter-spacing="1.1">IDB</text>
        <text class="verified" x="166" y="185" font-size="13.8" letter-spacing="2.9">VERIFIED</text>
      </svg>
      <p class="spec"><strong>x = 166</strong><br>Asimetría inicial de 6 px.</p>
    </article>

    <article>
      <h2>Desplazamiento +8 px</h2>
      <svg class="seal" viewBox="0 0 320 320" role="img" aria-label="D3 con bloque central desplazado 8 píxeles a la derecha">
        <defs>
          <path id="center8-top" d="M41 160 A119 119 0 0 1 279 160"/>
          <path id="center8-bottom" d="M41 160 A119 119 0 0 0 279 160"/>
        </defs>
        <circle cx="160" cy="160" r="143" fill="none" stroke="#176c59" stroke-width="2.6"/>
        <circle cx="160" cy="160" r="133" fill="none" stroke="#176c59" stroke-width="1.4"/>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center8-top" startOffset="50%" text-anchor="middle">INSTITUTO DIGITAL</textPath></text>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center8-bottom" startOffset="50%" text-anchor="middle">DE BIENESTAR</textPath></text>
        <text class="idb" x="168" y="158" font-size="41" letter-spacing="1.1">IDB</text>
        <text class="verified" x="168" y="185" font-size="13.8" letter-spacing="2.9">VERIFIED</text>
      </svg>
      <p class="spec"><strong>x = 168</strong><br>Asimetría intermedia de 8 px.</p>
    </article>

    <article>
      <h2>Desplazamiento +10 px</h2>
      <svg class="seal" viewBox="0 0 320 320" role="img" aria-label="D3 con bloque central desplazado 10 píxeles a la derecha">
        <defs>
          <path id="center10-top" d="M41 160 A119 119 0 0 1 279 160"/>
          <path id="center10-bottom" d="M41 160 A119 119 0 0 0 279 160"/>
        </defs>
        <circle cx="160" cy="160" r="143" fill="none" stroke="#176c59" stroke-width="2.6"/>
        <circle cx="160" cy="160" r="133" fill="none" stroke="#176c59" stroke-width="1.4"/>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center10-top" startOffset="50%" text-anchor="middle">INSTITUTO DIGITAL</textPath></text>
        <text class="arc" font-size="12.4" letter-spacing="1.95"><textPath href="#center10-bottom" startOffset="50%" text-anchor="middle">DE BIENESTAR</textPath></text>
        <text class="idb" x="170" y="158" font-size="41" letter-spacing="1.1">IDB</text>
        <text class="verified" x="170" y="185" font-size="13.8" letter-spacing="2.9">VERIFIED</text>
      </svg>
      <p class="spec"><strong>x = 170</strong><br>Asimetría marcada de 10 px.</p>
    </article>
  </main>
</body>
</html>
